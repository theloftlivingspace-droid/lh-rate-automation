name: Deploy to Apps Script

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.clasp.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp@2.4.2

      - name: Write clasp credentials
        run: |
          echo "${{ secrets.CLASP_CREDENTIALS }}" > ~/.clasprc.json
          python3 -m json.tool ~/.clasprc.json > /dev/null && echo "credentials JSON is valid" || echo "credentials JSON is INVALID"

      - name: Push to Apps Script
        run: |
          set +e
          clasp push --force > push.log 2>&1
          code=$?
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat push.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat push.log
          exit $code
