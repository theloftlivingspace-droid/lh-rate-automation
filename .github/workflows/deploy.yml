name: Deploy to Apps Script

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.clasp.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp@latest

      - name: Write clasp credentials
        run: |
          echo "${{ secrets.CLASP_CREDENTIALS }}" > ~/.clasprc.json
          python3 -m json.tool ~/.clasprc.json > /dev/null && echo "credentials JSON is valid" || echo "credentials JSON is INVALID"

      - name: Push to Apps Script
        run: |
          set +e
          clasp push --force > push.log 2>&1
          echo "PUSH_EXIT_CODE=$?" >> $GITHUB_ENV
          cat push.log

      - name: Commit debug log on failure
        if: env.PUSH_EXIT_CODE != '0'
        run: |
          git config user.email "ci@debug.local"
          git config user.name "CI Debug"
          cp push.log debug-push-log.txt
          git add debug-push-log.txt
          git commit -m "debug: clasp push log [skip ci]"
          git push origin HEAD:main

      - name: Fail if push failed
        if: env.PUSH_EXIT_CODE != '0'
        run: exit 1
